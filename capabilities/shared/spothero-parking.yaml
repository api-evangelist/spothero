naftiko: "1.0.0-alpha1"

info:
  label: "SpotHero Parking API"
  description: "Shared capability definition for the SpotHero Parking API, providing parking search, facility details, availability checks, and reservation management across North America's largest off-street parking network."
  tags:
    - Parking
    - Mobility
    - Transportation
    - Reservations
    - Navigation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPOTHERO_API_KEY: SPOTHERO_API_KEY

capability:
  consumes:
    - type: http
      namespace: spothero
      baseUri: https://api.spothero.com/v2
      description: "SpotHero Parking API for searching and booking parking across North America"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{SPOTHERO_API_KEY}}"
        placement: header
      resources:
        - name: search
          path: /search
          description: "Search for available parking locations"
          operations:
            - name: search-parking
              method: GET
              description: "Search for parking near a location for a given time period"
              inputParameters:
                - name: latitude
                  in: query
                  type: number
                  required: false
                  description: "Latitude of search center"
                - name: longitude
                  in: query
                  type: number
                  required: false
                  description: "Longitude of search center"
                - name: address
                  in: query
                  type: string
                  required: false
                  description: "Street address or point of interest"
                - name: starts
                  in: query
                  type: string
                  required: true
                  description: "Parking start time (ISO 8601)"
                - name: ends
                  in: query
                  type: string
                  required: true
                  description: "Parking end time (ISO 8601)"
                - name: radius
                  in: query
                  type: number
                  required: false
                  description: "Search radius in miles"
                - name: vehicle_type
                  in: query
                  type: string
                  required: false
                  description: "Vehicle type: car, motorcycle, oversized, monthly"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort by: distance, price, or rating"
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: array
                  value: "$.results"
                - name: total
                  type: integer
                  value: "$.total"

        - name: facilities
          path: /facilities/{facility_id}
          description: "Parking facility details"
          operations:
            - name: get-facility
              method: GET
              description: "Get detailed information about a parking facility"
              inputParameters:
                - name: facility_id
                  in: path
                  type: string
                  required: true
                  description: "Unique facility identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: facility-availability
          path: /facilities/{facility_id}/availability
          description: "Real-time facility availability"
          operations:
            - name: get-facility-availability
              method: GET
              description: "Check real-time parking availability for a facility"
              inputParameters:
                - name: facility_id
                  in: path
                  type: string
                  required: true
                  description: "Unique facility identifier"
                - name: starts
                  in: query
                  type: string
                  required: true
                  description: "Start time (ISO 8601)"
                - name: ends
                  in: query
                  type: string
                  required: true
                  description: "End time (ISO 8601)"
                - name: vehicle_type
                  in: query
                  type: string
                  required: false
                  description: "Vehicle type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: facility-rates
          path: /facilities/{facility_id}/rates
          description: "Facility pricing rates"
          operations:
            - name: get-facility-rates
              method: GET
              description: "Retrieve pricing rates for a parking facility"
              inputParameters:
                - name: facility_id
                  in: path
                  type: string
                  required: true
                  description: "Unique facility identifier"
                - name: starts
                  in: query
                  type: string
                  required: false
                  description: "Start time for rate calculation"
                - name: ends
                  in: query
                  type: string
                  required: false
                  description: "End time for rate calculation"
              outputRawFormat: json
              outputParameters:
                - name: rates
                  type: array
                  value: "$.rates"

        - name: reservations
          path: /reservations
          description: "Parking reservations"
          operations:
            - name: list-reservations
              method: GET
              description: "List parking reservations for the partner account"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status: active, completed, cancelled, upcoming"
                - name: starts_after
                  in: query
                  type: string
                  required: false
                  description: "Filter reservations starting after this date"
                - name: facility_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by facility ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: reservations
                  type: array
                  value: "$.reservations"
                - name: total
                  type: integer
                  value: "$.total"
            - name: create-reservation
              method: POST
              description: "Create a new parking reservation"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  facility_id: "{{tools.facility_id}}"
                  rate_id: "{{tools.rate_id}}"
                  starts: "{{tools.starts}}"
                  ends: "{{tools.ends}}"
                  driver: "{{tools.driver}}"
                  vehicle: "{{tools.vehicle}}"

        - name: reservation
          path: /reservations/{reservation_id}
          description: "Individual reservation management"
          operations:
            - name: get-reservation
              method: GET
              description: "Get details for a specific reservation"
              inputParameters:
                - name: reservation_id
                  in: path
                  type: string
                  required: true
                  description: "Unique reservation identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-reservation
              method: DELETE
              description: "Cancel a parking reservation"
              inputParameters:
                - name: reservation_id
                  in: path
                  type: string
                  required: true
                  description: "Unique reservation identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: spothero-parking-rest
      resources:
        - path: /v1/search
          name: parking-search
          description: "Search for available parking"
          operations:
            - method: GET
              name: search-parking
              description: "Search parking near a location"
              call: "spothero.search-parking"
              with:
                latitude: "rest.latitude"
                longitude: "rest.longitude"
                starts: "rest.starts"
                ends: "rest.ends"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/facilities/{facility_id}
          name: facility-details
          operations:
            - method: GET
              name: get-facility
              description: "Get facility details"
              call: "spothero.get-facility"
              with:
                facility_id: "rest.facility_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/reservations
          name: reservations
          operations:
            - method: GET
              name: list-reservations
              description: "List reservations"
              call: "spothero.list-reservations"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-reservation
              description: "Create a reservation"
              call: "spothero.create-reservation"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spothero-parking-mcp
      transport: http
      tools:
        - name: search-parking
          description: "Search for available parking near a location for a time period"
          hints:
            readOnly: true
            openWorld: true
          call: "spothero.search-parking"
          with:
            latitude: "tools.latitude"
            longitude: "tools.longitude"
            starts: "tools.starts"
            ends: "tools.ends"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-facility
          description: "Get detailed information about a parking facility"
          hints:
            readOnly: true
            openWorld: true
          call: "spothero.get-facility"
          with:
            facility_id: "tools.facility_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: check-availability
          description: "Check real-time parking availability at a facility"
          hints:
            readOnly: true
            openWorld: true
          call: "spothero.get-facility-availability"
          with:
            facility_id: "tools.facility_id"
            starts: "tools.starts"
            ends: "tools.ends"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-rates
          description: "Get pricing rates for a parking facility"
          hints:
            readOnly: true
            openWorld: true
          call: "spothero.get-facility-rates"
          with:
            facility_id: "tools.facility_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-reservations
          description: "List parking reservations for the account"
          hints:
            readOnly: true
            openWorld: false
          call: "spothero.list-reservations"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-reservation
          description: "Create a new parking reservation at a facility"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "spothero.create-reservation"
          with:
            facility_id: "tools.facility_id"
            rate_id: "tools.rate_id"
            starts: "tools.starts"
            ends: "tools.ends"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-reservation
          description: "Get details for a specific parking reservation"
          hints:
            readOnly: true
            openWorld: false
          call: "spothero.get-reservation"
          with:
            reservation_id: "tools.reservation_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: cancel-reservation
          description: "Cancel a parking reservation"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "spothero.cancel-reservation"
          with:
            reservation_id: "tools.reservation_id"
          outputParameters:
            - type: object
              mapping: "$."
