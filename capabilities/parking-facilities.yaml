naftiko: 1.0.0-alpha2
info:
  label: SpotHero Parking API — Facilities
  description: 'SpotHero Parking API — Facilities. 1 operations. Lead operation: Get Facility. Self-contained Naftiko capability
    covering one Spothero business surface.'
  tags:
  - Spothero
  - Facilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPOTHERO_API_KEY: SPOTHERO_API_KEY
capability:
  consumes:
  - type: http
    namespace: parking-facilities
    baseUri: https://api.spothero.com/v2
    description: SpotHero Parking API — Facilities business capability. Self-contained, no shared references.
    resources:
    - name: facilities-facility_id
      path: /facilities/{facility_id}
      operations:
      - name: getfacility
        method: GET
        description: Get Facility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: facility_id
          in: path
          type: string
          description: Unique identifier for the parking facility
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.SPOTHERO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: parking-facilities-rest
    port: 8080
    description: REST adapter for SpotHero Parking API — Facilities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/facilities/{facility-id}
      name: facilities-facility-id
      description: REST surface for facilities-facility_id.
      operations:
      - method: GET
        name: getfacility
        description: Get Facility
        call: parking-facilities.getfacility
        with:
          facility_id: rest.facility_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: parking-facilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for SpotHero Parking API — Facilities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-facility
      description: Get Facility
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: parking-facilities.getfacility
      with:
        facility_id: tools.facility_id
      outputParameters:
      - type: object
        mapping: $.
